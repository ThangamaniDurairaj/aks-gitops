apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: myapp
  namespace: argocd
spec:
  project: default

  source:
    # IMPORTANT: The repoURL is patched dynamically by the argocd-setup workflow
    # using the actual GitHub repo URL from the workflow context.
    # For private repos, configure ArgoCD with a GitHub token or SSH key:
    #   argocd repo add https://github.com/your-org/aks-gitops --username <user> --password <token>
    # Or use SSH:
    #   argocd repo add ssh://git@github.com/your-org/aks-gitops --ssh-private-key-path <key>
    repoURL: https://github.com/your-org/aks-gitops
    targetRevision: main
    path: charts/myapp
    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - Validate=true
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
