name: ArgoCD - Register & Sync Application

on:
  push:
    branches:
      - main
    paths:
      - "argocd/**"
      - ".github/workflows/argocd-setup.yaml"

  workflow_dispatch:
    inputs:
      namespace:
        description: "Target Kubernetes namespace"
        required: true
        default: "default"
      resource_group:
        description: "AKS resource group"
        required: true
        default: "aks-rg"
      aks_cluster_name:
        description: "AKS cluster name"
        required: true
        default: "aks-gitops-test"
      argocd_namespace:
        description: "ArgoCD namespace on the cluster"
        required: true
        default: "argocd"

permissions:
  id-token: write
  contents: read

jobs:
  setup:
    name: Register Application with ArgoCD
    runs-on: ubuntu-latest

    env:
      NAMESPACE: ${{ github.event.inputs.namespace || 'default' }}
      RESOURCE_GROUP: ${{ github.event.inputs.resource_group || 'aks-rg' }}
      AKS_CLUSTER_NAME: ${{ github.event.inputs.aks_cluster_name || 'aks-gitops-test' }}
      ARGOCD_NAMESPACE: ${{ github.event.inputs.argocd_namespace || 'argocd' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login using OIDC
        uses: ./.github/actions/az-login-mi
        with:
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ env.RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}

      - name: Ensure ArgoCD is installed on the cluster
        run: |
          echo "Checking if ArgoCD Application CRD is installed..."
          if kubectl get crd applications.argoproj.io &>/dev/null; then
            echo "ArgoCD Application CRD found. ArgoCD is already installed."
            # Still verify the namespace has running pods
            if kubectl get namespace ${{ env.ARGOCD_NAMESPACE }} &>/dev/null; then
              kubectl get pods -n ${{ env.ARGOCD_NAMESPACE }} -l app.kubernetes.io/name=argocd-server -o name || \
                echo "Warning: argocd-server pods not found, but CRD exists."
            fi
          else
            echo "ArgoCD Application CRD not found. Installing ArgoCD..."
            kubectl create namespace ${{ env.ARGOCD_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -
            echo "Downloading and applying ArgoCD manifests..."
            kubectl apply -n ${{ env.ARGOCD_NAMESPACE }} -f https://raw.githubusercontent.com/argoproj/argo-cd/v2.13.0/manifests/install.yaml
            echo "Waiting for ArgoCD server to be ready..."
            kubectl wait --for=condition=available --timeout=180s deployment/argocd-server -n ${{ env.ARGOCD_NAMESPACE }} || \
              echo "Warning: argocd-server not ready within 180s. Check cluster resources or run the workflow again manually."
          fi

      - name: Set ArgoCD admin password
        run: |
          ADMIN_PASSWORD="${{ secrets.ARGOCD_ADMIN_PASSWORD }}"
          if [ -z "$ADMIN_PASSWORD" ]; then
            echo "ARGOCD_ADMIN_PASSWORD secret not set. Skipping password configuration."
            exit 0
          fi

          echo "Setting ArgoCD admin password from GitHub secret..."

          # Wait for argocd-secret to be present (may take a moment on fresh install)
          echo "Waiting for argocd-secret to be available..."
          for i in $(seq 1 12); do
            if kubectl get secret argocd-secret -n ${{ env.ARGOCD_NAMESPACE }} &>/dev/null; then
              echo "argocd-secret found."
              break
            fi
            if [ "$i" -eq 12 ]; then
              echo "Error: argocd-secret not found after 60s. Skipping password update."
              exit 1
            fi
            sleep 5
          done

          # Install htpasswd to generate bcrypt hash
          sudo apt-get update -qq && sudo apt-get install -y -qq apache2-utils

          # Generate bcrypt hash of the admin password
          HASH=$(htpasswd -bnBC 10 "" "$ADMIN_PASSWORD" | cut -d: -f2)
          echo "Bcrypt hash generated."

          # Patch the argocd-secret with the new password hash
          kubectl patch secret argocd-secret -n ${{ env.ARGOCD_NAMESPACE }} \
            -p "{\"data\":{\"admin.password\":\"$(echo -n "$HASH" | base64 -w0)\"}}"

          # Remove the initial admin secret so only the new password is valid
          kubectl delete secret argocd-initial-admin-secret -n ${{ env.ARGOCD_NAMESPACE }} --ignore-not-found

          echo "ArgoCD admin password configured successfully."

      - name: Patch ArgoCD Application manifest with repo URL
        run: |
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          echo "Using repo URL: $REPO_URL"
          sed -i "s|repoURL: .*|repoURL: $REPO_URL|" argocd/myapp-application.yaml
          echo "--- Patched Application manifest ---"
          cat argocd/myapp-application.yaml

      - name: Apply ArgoCD Application manifest
        run: |
          echo "Applying ArgoCD Application manifest to cluster..."
          kubectl apply -f argocd/myapp-application.yaml --namespace ${{ env.ARGOCD_NAMESPACE }}
          echo "Application registered with ArgoCD."

      - name: Wait for ArgoCD app to be created
        run: |
          echo "Waiting for ArgoCD application 'myapp' to be recognized..."
          for i in $(seq 1 12); do
            if kubectl get application myapp -n ${{ env.ARGOCD_NAMESPACE }} &>/dev/null; then
              echo "Application 'myapp' found."
              break
            fi
            echo "Attempt $i/12 - not ready yet, waiting 5s..."
            sleep 5
          done

      - name: Verify ArgoCD application status
        run: |
          echo "=== ArgoCD Application 'myapp' ==="
          kubectl get application myapp -n ${{ env.ARGOCD_NAMESPACE }} -o wide
          echo ""
          echo "=== Sync Status ==="
          kubectl get application myapp -n ${{ env.ARGOCD_NAMESPACE }} \
            -o jsonpath='{.status.sync.status}{" — "}{.status.health.status}{"\n"}'
